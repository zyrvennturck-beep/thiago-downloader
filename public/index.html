<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidSave — YouTube Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0e;--s:#0f1218;--s2:#161b24;--b:#1e2633;--b2:#2a3545;--a:#3b82f6;--a2:#60a5fa;--ag:rgba(59,130,246,.15);--t:#e8edf5;--m:#5a6880;--m2:#8a9ab0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'Syne',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.wrap{max-width:820px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1}
header{padding:44px 0 36px;text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--b2);border-radius:100px;padding:6px 16px 6px 10px;margin-bottom:22px;font-size:12px;font-family:'DM Mono',monospace;color:var(--m2)}
.badge .dot{width:7px;height:7px;background:var(--a);border-radius:50%;box-shadow:0 0 8px var(--a);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-size:clamp(2.2rem,6vw,3.4rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#e8edf5,#8a9ab0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.sub{color:var(--m2);font-size:14px;max-width:400px;margin:0 auto;line-height:1.6}
.tabs{display:flex;gap:2px;background:var(--s2);border:1px solid var(--b);border-radius:10px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:9px;border-radius:7px;border:none;background:transparent;color:var(--m2);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.tab.on{background:var(--s);color:var(--t);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.pane{display:none}.pane.on{display:block}
.card{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:20px;margin-bottom:16px}
.card:focus-within{border-color:var(--b2)}
.lbl{font-size:11px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.12em;color:var(--m);margin-bottom:10px;display:block}
.row{display:flex;gap:10px}
input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:13px 16px;color:var(--t);font-family:'Syne',sans-serif;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
input::placeholder{color:var(--m)}
input:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--ag)}
.btn{padding:13px 22px;border-radius:10px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;transition:all .15s;white-space:nowrap;background:var(--a);color:#fff}
.btn:hover{background:var(--a2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,130,246,.35)}
.btn:disabled{background:var(--b2);color:var(--m);cursor:not-allowed;transform:none;box-shadow:none}
.st{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;font-size:13px;font-family:'DM Mono',monospace;margin-bottom:14px}
.st.info{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:var(--a2)}
.st.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#f87171}
.st.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#4ade80}
.spin{width:15px;height:15px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.rt{font-size:11px;font-family:'DM Mono',monospace;color:var(--m);text-transform:uppercase;letter-spacing:.1em}
.rc{font-size:11px;font-family:'DM Mono',monospace;color:var(--m);background:var(--s2);border:1px solid var(--b);padding:3px 10px;border-radius:100px}
.grid{display:flex;flex-direction:column;gap:10px}
.vc{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:14px;display:flex;gap:14px;transition:border-color .2s,transform .15s,box-shadow .2s;animation:ci .3s ease backwards}
.vc:hover{border-color:var(--b2);box-shadow:0 4px 20px rgba(0,0,0,.3);transform:translateY(-1px)}
@keyframes ci{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.tw{flex-shrink:0;width:136px;height:80px;border-radius:8px;overflow:hidden;background:var(--s2);position:relative}
@media(max-width:480px){.tw{width:90px;height:54px}}
.tw img{width:100%;height:100%;object-fit:cover;display:block}
.db{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);color:#fff;font-size:10px;font-family:'DM Mono',monospace;padding:2px 5px;border-radius:3px}
.vi{flex:1;min-width:0}
.vt{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vm{font-size:11px;font-family:'DM Mono',monospace;color:var(--m2);margin-bottom:10px}
.va{display:flex;gap:7px;flex-wrap:wrap}
.bdl{background:var(--s2);border:1px solid var(--b2);color:var(--t);padding:8px 14px;font-size:12px;border-radius:7px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all .15s}
.bdl:hover{background:var(--a);border-color:var(--a);color:#fff}
.bw{background:transparent;border:1px solid var(--b2);color:var(--m2);padding:8px 12px;font-size:12px;border-radius:7px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all .15s}
.bw:hover{color:var(--t);border-color:var(--m)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:16px}
@media(min-width:600px){.mo{align-items:center}}
.mb{background:var(--s);border:1px solid var(--b2);border-radius:18px;padding:24px;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,.7);animation:mi .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes mi{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.mt2{font-size:15px;font-weight:700;margin-bottom:4px}
.ms2{font-size:11px;color:var(--m2);margin-bottom:16px;font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.fb{background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:12px 8px;cursor:pointer;text-align:center;color:var(--t);font-family:'Syne',sans-serif;transition:all .15s}
.fb:hover{background:rgba(59,130,246,.12);border-color:var(--a);transform:translateY(-1px)}
.fi{font-size:18px;margin-bottom:5px}
.fq{font-size:13px;font-weight:700;margin-bottom:1px}
.fl{font-size:10px;font-family:'DM Mono',monospace;color:var(--m2)}
.mc{width:100%;padding:10px;background:transparent;border:1px solid var(--b2);border-radius:9px;color:var(--m2);font-family:'Syne',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.mc:hover{background:var(--s2);color:var(--t)}
.toast{position:fixed;bottom:20px;right:20px;z-index:200;background:var(--s);border:1px solid var(--b2);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:230px;animation:ti .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes ti{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:none}}
.tie{font-size:20px;flex-shrink:0}
.tt2{font-weight:600;font-size:13px;margin-bottom:1px}
.ts2{color:var(--m2);font-family:'DM Mono',monospace;font-size:11px}
.empty{text-align:center;padding:52px 20px;color:var(--m)}
.ei{font-size:40px;margin-bottom:12px;opacity:.5}
footer{text-align:center;font-size:11px;font-family:'DM Mono',monospace;color:var(--m);margin-top:40px;line-height:1.7}
footer a{color:var(--m2)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge"><span class="dot"></span>VidSave</div>
    <h1>VidSave</h1>
    <p class="sub">Search any YouTuber, pick a video, download for offline viewing.</p>
  </header>

  <div class="tabs">
    <button class="tab on" onclick="switchTab('search')">🔍 Search Channel</button>
    <button class="tab"    onclick="switchTab('url')">🔗 Paste URL</button>
  </div>

  <div id="ps" class="pane on">
    <div class="card">
      <label class="lbl">YouTuber / Channel Name</label>
      <div class="row">
        <input id="si" type="text" placeholder="e.g. Ninjaxx, MrBeast, Markiplier…" autocomplete="off"/>
        <button class="btn" id="sb" onclick="doSearch()">Search</button>
      </div>
    </div>
  </div>

  <div id="pu" class="pane">
    <div class="card">
      <label class="lbl">YouTube Video URL</label>
      <div class="row">
        <input id="ui" type="text" placeholder="https://youtube.com/watch?v=…" autocomplete="off"/>
        <button class="btn" onclick="dlFromUrl()">Download</button>
      </div>
    </div>
  </div>

  <div id="stEl" style="display:none"></div>

  <div id="resSection" style="display:none">
    <div class="rh">
      <span class="rt">Videos Found</span>
      <span class="rc" id="resCount">0</span>
    </div>
    <div class="grid" id="vGrid"></div>
  </div>

  <div class="empty" id="emptyEl">
    <div class="ei">📺</div>
    <div style="font-size:14px">Search a YouTuber above</div>
    <div style="font-size:12px;font-family:'DM Mono',monospace;margin-top:6px;color:var(--m)">Results appear here</div>
  </div>

  <footer>
    Downloads via <a href="https://cobalt.tools" target="_blank">cobalt.tools</a> — open source, no ads.<br>
    Personal use only. Respect creators & YouTube ToS.
  </footer>
</div>

<div id="modal" class="mo" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="mb">
    <div class="mt2">Choose Quality</div>
    <div class="ms2" id="mTitle">—</div>
    <div class="fg" id="mGrid"></div>
    <button class="mc" onclick="document.getElementById('modal').style.display='none'">Cancel</button>
  </div>
</div>

<div id="toastEl" class="toast" style="display:none">
  <span class="tie" id="tIcon">⬇️</span>
  <div>
    <div class="tt2" id="tTitle">Loading…</div>
    <div class="ts2" id="tSub">Please wait</div>
  </div>
</div>

<script>
let cur = {id:'', title:''};

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',(i===0&&t==='search')||(i===1&&t==='url')));
  document.getElementById('ps').classList.toggle('on',t==='search');
  document.getElementById('pu').classList.toggle('on',t==='url');
  hideSt();
}

function showSt(msg,cls='info',spin=false){
  const el=document.getElementById('stEl');
  el.style.display='flex';el.className='st '+cls;
  el.innerHTML=(spin?'<div class="spin"></div>':'')+`<span>${msg}</span>`;
}
function hideSt(){document.getElementById('stEl').style.display='none'}

async function doSearch(){
  const q=document.getElementById('si').value.trim();
  if(!q) return;
  const btn=document.getElementById('sb');
  btn.disabled=true; btn.textContent='Searching…';
  showSt(`Searching for "${q}"…`,'info',true);
  document.getElementById('resSection').style.display='none';
  document.getElementById('emptyEl').style.display='none';

  try{
    // Call our own Vercel serverless API — no CORS issues, no rate limits
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    if(d.videos && d.videos.length > 0){
      renderVids(d.videos);
    } else {
      showSt(d.error || 'No results found. Try a different name.','err');
      document.getElementById('emptyEl').style.display='block';
    }
  } catch(e){
    showSt('Search failed. Please try again.','err');
    document.getElementById('emptyEl').style.display='block';
  }

  btn.disabled=false; btn.textContent='Search';
}

function renderVids(vids){
  hideSt();
  const g=document.getElementById('vGrid');
  g.innerHTML='';
  vids.forEach((v,i)=>{
    const c=document.createElement('div');
    c.className='vc'; c.style.animationDelay=(i*25)+'ms';
    c.innerHTML=`
      <div class="tw">
        <img src="${v.thumb}" alt="" loading="lazy" onerror="this.style.display='none'">
        ${v.dur?`<span class="db">${esc(v.dur)}</span>`:''}
      </div>
      <div class="vi">
        <div class="vt">${esc(v.title)}</div>
        <div class="vm">${[v.views,v.date,v.author].filter(Boolean).join(' · ')}</div>
        <div class="va">
          <button class="bdl" onclick="openModal('${v.id}',${JSON.stringify(v.title)})">⬇ Download</button>
          <button class="bw" onclick="window.open('https://youtu.be/${v.id}','_blank')">▶ Watch</button>
        </div>
      </div>`;
    g.appendChild(c);
  });
  document.getElementById('resSection').style.display='block';
  document.getElementById('resCount').textContent=vids.length+' videos';
  document.getElementById('emptyEl').style.display='none';
}

function openModal(id,title){
  cur={id,title};
  document.getElementById('mTitle').textContent=title;
  const fmts=[
    {q:'1080',l:'Full HD',ic:'🎬'},
    {q:'720', l:'HD',     ic:'📺'},
    {q:'480', l:'SD',     ic:'📱'},
    {q:'360', l:'Mobile', ic:'💾'},
    {q:'audio',l:'MP3',  ic:'🎵'},
  ];
  document.getElementById('mGrid').innerHTML=fmts.map(f=>`
    <button class="fb" onclick="startDl('${f.q}')">
      <div class="fi">${f.ic}</div>
      <div class="fq">${f.q==='audio'?'MP3':f.q+'p'}</div>
      <div class="fl">${f.l}</div>
    </button>`).join('');
  document.getElementById('modal').style.display='flex';
}

async function startDl(q){
  document.getElementById('modal').style.display='none';
  showToast('⬇️','Preparing download…','Getting link from server');

  try{
    const r=await fetch('/api/download',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({videoId:cur.id, quality:q})
    });
    const d=await r.json();

    if(d.url){
      // Direct download
      const a=document.createElement('a');
      a.href=d.url;
      a.download=san(cur.title)+'.'+(q==='audio'?'mp3':'mp4');
      a.style.display='none';
      document.body.appendChild(a); a.click();
      setTimeout(()=>document.body.removeChild(a),3000);
      showToast('✅','Download started!','Check your Downloads folder');
      setTimeout(hideToast,6000);
    } else if(d.fallback){
      window.open(d.fallback,'_blank');
      showToast('🔗','Opened cobalt.tools','Click Download in the new tab');
      setTimeout(hideToast,7000);
    }
  } catch(e){
    const ytUrl=`https://www.youtube.com/watch?v=${cur.id}`;
    window.open(`https://cobalt.tools/?u=${encodeURIComponent(ytUrl)}`,'_blank');
    showToast('🔗','Opened cobalt.tools','Click Download in the new tab');
    setTimeout(hideToast,7000);
  }
}

function dlFromUrl(){
  const raw=document.getElementById('ui').value.trim();
  if(!raw||(!raw.includes('youtube.com')&&!raw.includes('youtu.be'))){
    showSt('Please enter a valid YouTube URL.','err'); return;
  }
  const id=xId(raw);
  if(!id){showSt('Could not read video ID from that URL.','err');return;}
  openModal(id,'Video from URL');
}

let tT;
function showToast(ic,ti,su){clearTimeout(tT);document.getElementById('tIcon').textContent=ic;document.getElementById('tTitle').textContent=ti;document.getElementById('tSub').textContent=su;document.getElementById('toastEl').style.display='flex';}
function hideToast(){document.getElementById('toastEl').style.display='none';}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function san(s){return(s||'video').replace(/[^a-zA-Z0-9 _-]/g,'').trim().replace(/ /g,'_').slice(0,60)||'video';}
function xId(u){const m=u.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:'';}

document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
document.getElementById('ui').addEventListener('keydown',e=>{if(e.key==='Enter')dlFromUrl();});
</script>
</body>
</html>
